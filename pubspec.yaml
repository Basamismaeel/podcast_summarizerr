name: podcast_safety_net
description: "Podcast Safety Net — premium podcast summarizer."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  macos_ui: ^2.0.0
  hotkey_manager: ^0.2.0
  tray_manager: ^0.2.3
  window_manager: ^0.3.9
  local_notifier: ^0.1.6
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.3
  drift: ^2.22.0
  drift_flutter: ^0.2.0
  uuid: ^4.3.3
  intl: ^0.19.0
  flutter_dotenv: ^5.1.0
  shared_preferences: ^2.2.2
  go_router: ^13.0.0
  http: ^1.2.0
  path_provider: ^2.1.2
  path: ^1.9.0
  flutter_local_notifications: ^17.0.0
  permission_handler: ^11.3.0
  sensors_plus: ^5.0.1
  vibration: ^2.0.0
  flutter_tts: ^4.0.2
  flutter_background_service: ^5.0.5
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  drift_dev: ^2.22.0
  riverpod_generator: ^2.3.9
